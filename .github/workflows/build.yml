name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_NAKAMA_HOST: ${{ secrets.NEXT_PUBLIC_NAKAMA_HOST || '127.0.0.1' }}
          NEXT_PUBLIC_NAKAMA_PORT: ${{ secrets.NEXT_PUBLIC_NAKAMA_PORT || '7350' }}
          NEXT_PUBLIC_NAKAMA_SERVER_KEY: ${{ secrets.NEXT_PUBLIC_NAKAMA_SERVER_KEY || 'defaultkey' }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY || '' }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST || 'https://us.i.posthog.com' }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL || '' }}
          NEXT_PUBLIC_MATRIX_HOMESERVER_URL: ${{ secrets.NEXT_PUBLIC_MATRIX_HOMESERVER_URL || 'https://matrix.org' }}
